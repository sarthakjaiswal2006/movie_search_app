<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLICKPICK</title> 
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="main"> 
    <div id="heading">
        <h1 id="title">FLICKPICK</h1>  

        <label style="width:50vw;font-size:20px;color:#00d4ff;" for="movie_input">
            SEARCH FOR MOVIE HERE
        </label>  

        <input class="hi" type="text" id="movie_input">  

        <select class="hi" id="language">
            <option value="">All Languages</option>
            <option value="en">English</option>
            <option value="hi">Hindi</option>
            <option value="ta">Tamil</option>
            <option value="te">Telugu</option>
        </select>

        <button class="hi" id="movie_search_btn">SEARCH</button>  
        <button class="hi" id="themeToggle">🌙 Dark</button>
    </div> 
</div>

<div id="movies"></div>    

<h1 style="text-align:center;" id="title">WATCHLIST</h1>   

<div id="watchlistedmovies"></div>

<div id="page-control">
    <button class="hi" id="prev">⬅ Prev</button>
    <span id="pageNumber">1</span>
    <button class="hi" id="next">Next ➡</button>
</div> 

<script src="script.js"></script>

</body>
</html>
